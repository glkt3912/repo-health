name: Monthly Repository Audit

on:
  schedule:
    - cron: '0 9 1 * *'  # 毎月1日 9:00 UTC
  workflow_dispatch:       # 手動トリガーも可能

permissions:
  contents: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run audit
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO_AUDIT_USERNAME: ${{ vars.REPO_AUDIT_USERNAME }}
        run: |
          chmod +x ./repo-audit.sh
          mkdir -p reports
          # --auto-archive: ARCHIVE 候補を自動アーカイブ（description/README に理由を記録後にアーカイブ）
          # --create-issues: STALE リポジトリに Health Check Issue を作成
          ./repo-audit.sh --output reports/ --create-issues --auto-archive

      - name: Commit report
        run: |
          git config user.name "repo-health-bot"
          git config user.email "bot@repo-health"
          git add reports/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: monthly audit report $(date +%Y-%m)"
            git push
          fi
