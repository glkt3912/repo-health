# GitHub ユーザー名は環境変数 REPO_AUDIT_USERNAME または .env で設定する
# 例: echo 'REPO_AUDIT_USERNAME=your-username' >> .env

thresholds:
  stale_months: 6
  archive_months: 12

# 常にアクティブ扱いにするリポジトリ（push 日時に関わらず評価対象外）
# 本ツール自身や dotfiles など、頻繁に更新しないが常に使用中のものを列挙する
# 例:
#   always_active:
#     - dotfiles
#     - portfolio
#     - this-repo-name
always_active: []

# --auto-archive 実行時の動作設定
archive:
  # アーカイブ前に description の先頭に理由を付与するか
  update_description: true
  # アーカイブ前に README.md 先頭にアーカイブバナーを挿入するか（README がない場合はスキップ）
  update_readme: true
  # description に付けるプレフィックス
  description_prefix: "[Archived by repo-health]"

report:
  output_dir: ~/repo-health-reports/
